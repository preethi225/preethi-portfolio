<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Messages | Preethi Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --off-white: #f9f8f6;
      --light: #f0ede8;
      --mid: #d6d0c8;
      --muted: #9a9188;
      --dark: #2a2520;
      --accent: #c4732a;
      --green: #4caf7d;
      --red: #e07070;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      padding: 1.5rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--white);
    }
    .header-title span { color: var(--accent); }
    .back-btn {
      font-size: 0.8rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    /* ─── MAIN ─── */
    main { padding: 3rem; max-width: 1100px; margin: 0 auto; }

    /* ─── STATS ─── */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem; margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 4px;
      padding: 1.5rem 2rem;
    }
    .stat-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem; font-weight: 600;
      color: var(--accent); line-height: 1;
      margin-bottom: 0.4rem;
    }
    .stat-card-label {
      font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--muted);
    }

    /* ─── TABLE SECTION ─── */
    .table-section {
      background: var(--white);
      border: 1px solid var(--light);
      border-radius: 4px;
      overflow: hidden;
    }
    .table-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-header h2 {
      font-size: 1rem; font-weight: 500; color: var(--dark);
    }
    .refresh-btn {
      font-size: 0.78rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent);
      background: none; border: 1px solid var(--accent);
      padding: 0.4rem 1rem; border-radius: 2px;
      cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--accent); color: var(--white); }

    /* ─── TABLE ─── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--off-white); }
    th {
      padding: 1rem 1.5rem;
      font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      text-align: left; font-weight: 500;
      border-bottom: 1px solid var(--light);
      white-space: nowrap;
    }
    td {
      padding: 1.1rem 1.5rem;
      font-size: 0.88rem; color: var(--dark);
      border-bottom: 1px solid var(--light);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--off-white); }

    .td-name { font-weight: 500; }
    .td-email { color: var(--muted); font-size: 0.82rem; }
    .td-message {
      max-width: 280px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; color: var(--muted);
    }
    .td-date { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.72rem; letter-spacing: 0.05em;
      text-transform: capitalize; font-weight: 500;
    }
    .badge-collaboration { background: #e8f4fd; color: #3a8abf; }
    .badge-project { background: #fef3e2; color: #c4732a; }
    .badge-feedback { background: #e8f8ee; color: #4caf7d; }
    .badge-other { background: var(--light); color: var(--muted); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      padding: 4rem 2rem; text-align: center;
    }
    .empty-state p {
      font-size: 0.95rem; color: var(--muted);
      margin-top: 1rem;
    }

    /* ─── LOADING ─── */
    .loading {
      padding: 3rem 2rem; text-align: center;
      color: var(--muted); font-size: 0.9rem;
    }
    .loading::after {
      content: ''; display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header { padding: 1.2rem 1.5rem; }
      main { padding: 1.5rem; }
      .stats { grid-template-columns: 1fr; gap: 1rem; }
      th, td { padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">Preethi <span>/ Admin</span></div>
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-card-num" id="totalCount">—</div>
        <div class="stat-card-label">Total Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="latestName">—</div>
        <div class="stat-card-label">Latest From</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num" id="latestDate">—</div>
        <div class="stat-card-label">Last Received</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="table-header">
        <h2>All Contact Messages</h2>
        <button class="refresh-btn" onclick="loadMessages()">↻ Refresh</button>
      </div>
      <div id="tableContent" class="loading">Loading messages</div>
    </div>
  </main>

  <script>
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function getBadgeClass(subject) {
      const map = {
        collaboration: 'badge-collaboration',
        project: 'badge-project',
        feedback: 'badge-feedback',
        other: 'badge-other'
      };
      return map[subject] || 'badge-other';
    }

    async function loadMessages() {
      const content = document.getElementById('tableContent');
      content.innerHTML = '<div class="loading">Loading messages</div>';

      try {
        const res = await fetch('/api/contact');
        const data = await res.json();
        const messages = data.messages || [];

        // Update stats
        document.getElementById('totalCount').textContent = messages.length;
        if (messages.length > 0) {
          document.getElementById('latestName').textContent = messages[0].name.split(' ')[0];
          document.getElementById('latestDate').textContent = formatDate(messages[0].createdAt).split(',')[0];
        }

        if (messages.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div style="font-size:2.5rem">📭</div>
              <p>No messages yet. Share your portfolio link to receive messages!</p>
            </div>`;
          return;
        }

        content.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Subject</th>
                  <th>Message</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>
                ${messages.map((m, i) => `
                  <tr>
                    <td style="color:var(--muted);font-size:0.8rem">${i + 1}</td>
                    <td class="td-name">${m.name}</td>
                    <td class="td-email">${m.email}</td>
                    <td><span class="badge ${getBadgeClass(m.subject)}">${m.subject}</span></td>
                    <td class="td-message" title="${m.message}">${m.message}</td>
                    <td class="td-date">${formatDate(m.createdAt)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        content.innerHTML = `
          <div class="empty-state">
            <div style="font-size:2rem">⚠️</div>
            <p>Could not load messages. Please try refreshing.</p>
          </div>`;
      }
    }

    // Load on page open
    loadMessages();
  </script>
</body>
</html>
